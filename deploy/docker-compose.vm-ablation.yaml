# ABLATION compose file - distinct from docker-compose.vm.yaml.
# Workers invoke src.worker.ablation_worker (re-export of src.worker.worker)
# and accept WORKER_PROCESSING_SPEED env var for heterogeneous capacity
# scenarios. The main campaign uses docker-compose.vm.yaml; this file is
# used only by scripts/run_ablation.py to preserve campaign reproducibility.
#
# Per-VM Docker Compose template for 4-domain O-RAN deployment.
#
# Each VM runs this compose file with its own .env file:
#   docker compose --env-file deploy/vm1-edge-du.env -f deploy/docker-compose.vm.yaml up -d
#
# All containers use host networking. Workers get unique ports via base+offset.
# The broker listens on ${BROKER_PORT} (default 8080).

x-worker-common: &worker-common
  image: neural-pubsub:latest
  network_mode: host
  restart: unless-stopped

services:
  broker:
    image: neural-pubsub:latest
    network_mode: host
    volumes:
      - ../results:/results
    entrypoint:
      - python3
      - -m
      - ${BROKER_MODULE:-src.broker.neural_broker}
      - --domain=${BROKER_DOMAIN}
      - --port=${BROKER_PORT:-8080}
      - --peers
      - ${PEER_URL_1}
      - ${PEER_URL_2}
      - ${PEER_URL_3}
    environment:
      - PYTHONUNBUFFERED=1
      - BROKER_MODULE=${BROKER_MODULE:-src.broker.neural_broker}
      - GOVERNANCE_ENABLED=${GOVERNANCE_ENABLED:-false}
      # ABLATION: enable load-aware placement + dynamic congestion pricing
      # via env vars. Must NOT be CLI flags because StaticBroker (rr-global)
      # rejects unknown argparse flags. NeuralBroker reads these env vars
      # as defaults for its CLI options.
      - MARKET_LOAD_AWARE=true
      - DYNAMIC_BIDDING=true
      - PLACEMENT_MODE=${PLACEMENT_MODE:-neural}
      - PLACEMENT=${PLACEMENT:-round_robin}
      - WAN_COST_MS=${WAN_COST_MS:-0}
      - FEDERATION_INTERVAL_S=${FEDERATION_INTERVAL_S:-10}
      - RESULT_FILE=${RESULT_FILE:-}

  # 12 workers with unique ports (base + 0..11)
  worker-0:
    <<: *worker-common
    entrypoint:
      - python3
      - -m
      - src.worker.ablation_worker
      - --node-id=${BROKER_DOMAIN}-worker-0
      - --domain=${BROKER_DOMAIN}
      - --slice=${WORKER_SLICE}
      - --broker-url=${WORKER_BROKER_URL:-http://localhost:8080}
      - --port=8081
      - --callback-url=http://${VM_IP:-localhost}:8081
      - --bid-cost=${WORKER_BID_COST_MS:-100}
      - --processing-speed=${WORKER_PROCESSING_SPEED:-1.0}

  worker-1:
    <<: *worker-common
    entrypoint:
      - python3
      - -m
      - src.worker.ablation_worker
      - --node-id=${BROKER_DOMAIN}-worker-1
      - --domain=${BROKER_DOMAIN}
      - --slice=${WORKER_SLICE}
      - --broker-url=${WORKER_BROKER_URL:-http://localhost:8080}
      - --port=8082
