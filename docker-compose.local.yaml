# =============================================================================
# Local emulation of the multi-domain, multi-slice Neural Pub/Sub testbed.
#
# Topology:
#   2 domains (d1 = Tokyo, d2 = Oulu), each with its own broker and workers.
#   Domain 1: 2 URLLC workers + 1 eMBB worker  (handles CQI + anomaly pipelines)
#   Domain 2: 2 eMBB workers only               (CQI pipelines forwarded to D1)
#
# Network slices (Docker internal networks):
#   slice-URLLC-d1  -- Near-RT RIC slice, domain 1 (broker-d1 + URLLC workers)
#   slice-eMBB-d1   -- Edge/eMBB slice, domain 1   (broker-d1 + eMBB workers)
#   slice-eMBB-d2   -- Edge/eMBB slice, domain 2   (broker-d2 + eMBB workers)
#   federation      -- Cross-domain overlay (brokers + workload generator)
#
# The workload generator connects to broker-d1 via the federation network and
# submits pipelines at a configurable Poisson arrival rate. Broker-d1 places
# stages locally or forwards cross-domain to broker-d2 via federation.
# Brokers exchange subscription summaries over the federation network.
#
# Environment variables (with defaults):
#   ARRIVAL_RATE (5.0)  -- workload arrival rate (pipelines/s)
#   DURATION_S   (60)   -- workload duration (seconds)
#   SEED         (42)   -- random seed for reproducibility
#
# Usage:
#   docker compose -f docker-compose.local.yaml up --build
#   docker compose -f docker-compose.local.yaml down -v
# =============================================================================

services:

  broker-d1:
    image: neural-pubsub:latest
    build: .
    command: >
      -m ${BROKER_MODULE:-src.broker.neural_broker}
      --domain d1
      --broker-id broker-d1
      --port 8080
      --peers http://broker-d2:8080
    environment:
      - RESULT_FILE=${RESULT_FILE:-/app/results/metrics.csv}
    networks:
      - slice-URLLC-d1
      - slice-eMBB-d1
      - federation
    ports:
      - "8080:8080"
    volumes:
      - ./results:/app/results
    cpuset: "${CPUSET_BROKER_D1:-0-1}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  broker-d2:
    image: neural-pubsub:latest
    build: .
    command: >
      -m ${BROKER_MODULE:-src.broker.neural_broker}
      --domain d2
      --broker-id broker-d2
      --port 8080
      --peers http://broker-d1:8080
    networks:
      - slice-eMBB-d2
      - federation
    ports:
      - "8082:8080"
    cpuset: "${CPUSET_BROKER_D2:-2-3}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Domain 1: 2 URLLC workers (CQI pipeline) + 1 eMBB worker (anomaly detection)
  worker-d1-urllc-1:
    image: neural-pubsub:latest
    build: .
    command: >
      -m src.worker
      --node-id d1-urllc-1
      --slice URLLC
      --domain d1
      --broker-url http://broker-d1:8080
      --capacity 1.0
    networks:
      - slice-URLLC-d1
    depends_on:
      broker-d1:
        condition: service_healthy
    restart: unless-stopped

  worker-d1-urllc-2:
    image: neural-pubsub:latest
    build: .
    command: >
      -m src.worker
      --node-id d1-urllc-2
      --slice URLLC
      --domain d1
      --broker-url http://broker-d1:8080
      --capacity 1.0
    networks:
      - slice-URLLC-d1
    depends_on:
      broker-d1:
        condition: service_healthy
    restart: unless-stopped

  worker-d1-embb-1:
    image: neural-pubsub:latest
    build: .
    command: >
      -m src.worker
      --node-id d1-embb-1
      --slice eMBB
      --domain d1
      --broker-url http://broker-d1:8080
      --capacity 2.0
    networks:
      - slice-eMBB-d1
    depends_on:
      broker-d1:
        condition: service_healthy
    restart: unless-stopped

  # Domain 2: eMBB only (no URLLC) — CQI pipelines must be forwarded to D1
  worker-d2-embb-1:
    image: neural-pubsub:latest
    build: .
    command: >
      -m src.worker
      --node-id d2-embb-1
      --slice eMBB
      --domain d2
      --broker-url http://broker-d2:8080
      --capacity 2.0
    networks:
      - slice-eMBB-d2
    depends_on:
      broker-d2:
        condition: service_healthy
    restart: unless-stopped

  worker-d2-embb-2:
    image: neural-pubsub:latest
    build: .
    command: >
      -m src.worker
      --node-id d2-embb-2
      --slice eMBB
      --domain d2
      --broker-url http://broker-d2:8080
      --capacity 1.0
    networks:
      - slice-eMBB-d2
    depends_on:
      broker-d2:
        condition: service_healthy
    restart: unless-stopped

  workload:
    image: neural-pubsub:latest
    build: .
    command: >
      -m src.workload
      --broker-url http://broker-d1:8080
      --arrival-rate ${ARRIVAL_RATE:-5.0}
      --duration ${DURATION_S:-60}
      --seed ${SEED:-42}
      --result-file ${RESULT_FILE:-/app/results/metrics.csv}
      --warmup ${WARMUP_S:-0}
    volumes:
      - ./results:/app/results
    networks:
      - federation
    depends_on:
      broker-d1:
        condition: service_healthy
      broker-d2:
        condition: service_healthy

networks:
  slice-URLLC-d1:
    internal: true
  slice-eMBB-d1:
    internal: true
  slice-eMBB-d2:
    internal: true
  federation:
    internal: false
    # WAN emulation: tc netem adds configurable latency to cross-domain traffic.
    # Override WAN_DELAY_MS (default 10ms) and WAN_JITTER_MS (default 2ms)
    # to simulate realistic inter-site network conditions.
    # Applied via entrypoint tc qdisc wrapper in broker containers.
    driver_opts:
      com.docker.network.driver.mtu: "1500"
    labels:
      - "npubsub.wan.delay=${WAN_DELAY_MS:-10}ms"
      - "npubsub.wan.jitter=${WAN_JITTER_MS:-2}ms"
      - "npubsub.wan.tc_netem=true"
