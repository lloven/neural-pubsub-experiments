# =============================================================================
# Kafka overlay for Phase A baseline (A1 config).
#
# Adds a single-node Kafka broker (KRaft mode, no Zookeeper) and overrides
# broker-d1 to use kafka_broker instead of neural_broker.
#
# Usage:
#   docker compose -f docker-compose.local.yaml -f docker-compose.kafka.yaml up --build
# =============================================================================

services:

  kafka:
    image: apache/kafka:3.7.0
    environment:
      # KRaft mode (no Zookeeper) — official Apache image env vars
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Single-node defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Auto-create topics for pipeline types
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Cluster ID for KRaft (required by Apache image)
      CLUSTER_ID: "NeuralPubSubTestCluster01"
    networks:
      - federation
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Override broker-d1 to use kafka_broker
  broker-d1:
    command: >
      -m src.broker.kafka_broker
      --domain d1
      --broker-id broker-d1
      --port 8080
      --kafka-bootstrap kafka:9092
    environment:
      DOMAIN: d1
      BROKER_ID: broker-d1
      KAFKA_BOOTSTRAP: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
