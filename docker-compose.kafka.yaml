# =============================================================================
# Kafka transport overlay for the dual-transport factorial experiment.
#
# Adds a Kafka broker (KRaft mode) and a concurrent consumer sidecar.
# Sets TRANSPORT=kafka on all broker services so they publish stage
# assignments to Kafka topics instead of direct HTTP dispatch.
#
# The consumer reads target_url from each message (embedded by the broker's
# placement decision) and HTTP-dispatches to the specified worker.
#
# Usage (combined with base):
#   docker compose -f docker-compose.local.yaml -f docker-compose.kafka.yaml up --build
# =============================================================================

services:

  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    dns_opt:
      - ndots:0
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Single-node defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "NeuralPubSubTestCluster01"
    networks:
      - federation
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Override brokers: set TRANSPORT=kafka so they publish to Kafka topics
  broker-d1:
    environment:
      - TRANSPORT=kafka
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  broker-d2:
    environment:
      - TRANSPORT=kafka
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # Concurrent consumer sidecar: reads from Kafka, dispatches to placed workers
  kafka-consumer:
    image: neural-pubsub:latest
    build: .
    dns_opt:
      - ndots:0
    command: >
      -m src.broker.kafka_consumer
      --kafka-bootstrap kafka:9092
      --broker-url http://broker-d1:8080
    networks:
      - federation
      - slice-URLLC-d1
      - slice-eMBB-d1
      - slice-eMBB-d2
    depends_on:
      kafka:
        condition: service_healthy
      broker-d1:
        condition: service_healthy
    restart: unless-stopped
